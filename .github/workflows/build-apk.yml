name: Build A99 Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Extract project ZIP
        run: |
          mkdir extracted
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          unzip -q "$ZIP_FILE" -d extracted
          ls -la extracted/A99CricketCalendar

      - name: Build APK
        run: |
          cd extracted/A99CricketCalendar
          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: A99-Cricket-Calendar-APK
          path: extracted/A99CricketCalendar/app/build/outputs/apk/debug/app-debug.apk
