name: Build A99 Cricket Calendar v1.3 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Extract final v1.3 project
        shell: bash
        run: |
          set -euo pipefail
          echo "Files available in repository root:"
          find "$GITHUB_WORKSPACE" -maxdepth 1 -type f -printf '%f\n' | sort

          ZIP_FILE=$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f -iname "*Final*v1.3*Project*.zip" | head -n 1 || true)
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: A99_Cricket_Calendar_Final_v1.3_Project.zip is not uploaded in the repository root."
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/extracted"
          mkdir -p "$GITHUB_WORKSPACE/extracted"
          unzip -q "$ZIP_FILE" -d "$GITHUB_WORKSPACE/extracted"

          SETTINGS_FILE=$(find "$GITHUB_WORKSPACE/extracted" -type f -name "settings.gradle.kts" | head -n 1 || true)
          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: settings.gradle.kts was not found inside the uploaded ZIP."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project found at: $PROJECT_DIR"

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare APK file
        shell: bash
        run: |
          set -euo pipefail
          APK_FILE="$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK_FILE"
          mkdir -p "$GITHUB_WORKSPACE/output"
          cp "$APK_FILE" "$GITHUB_WORKSPACE/output/A99-Cricket-Calendar-v1.3.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: A99-Cricket-Calendar-v1.3-APK
          path: output/A99-Cricket-Calendar-v1.3.apk
          if-no-files-found: error
