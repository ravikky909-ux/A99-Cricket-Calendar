name: Build Allrounder99 Cricket v1.5 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Extract final v1.5 project
        shell: bash
        run: |
          set -euo pipefail
          echo "Repository root files:"
          find "$GITHUB_WORKSPACE" -maxdepth 1 -type f -printf '%f\n' | sort

          ZIP_FILE=$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f \( \
            -iname "A99_Cricket_Calendar_Final_v1.5_Project.zip" -o \
            -iname "*Final*v1.5*Project*.zip" -o \
            -iname "*v1.5*Project*.zip" \
          \) | head -n 1 || true)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Upload A99_Cricket_Calendar_Final_v1.5_Project.zip to the repository root."
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/extracted"
          mkdir -p "$GITHUB_WORKSPACE/extracted"
          unzip -q "$ZIP_FILE" -d "$GITHUB_WORKSPACE/extracted"

          SETTINGS_FILE=$(find "$GITHUB_WORKSPACE/extracted" -type f -name "settings.gradle.kts" | head -n 1 || true)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: settings.gradle.kts was not found inside the ZIP."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project found at: $PROJECT_DIR"

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare APK
        shell: bash
        run: |
          set -euo pipefail
          APK_FILE="$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk"

          test -f "$APK_FILE"

          mkdir -p "$GITHUB_WORKSPACE/output"

          cp "$APK_FILE" "$GITHUB_WORKSPACE/output/Allrounder99-Cricket-v1.5.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Allrounder99-Cricket-v1.5-APK
          path: output/Allrounder99-Cricket-v1.5.apk
          if-no-files-found: error
