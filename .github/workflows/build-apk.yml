name: Build Allrounder99 Cricket v1.6 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore stable debug signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: ${{ runner.os }}-allrounder99-debug-keystore-v1

      - name: Locate or extract v1.6 project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$GITHUB_WORKSPACE/settings.gradle.kts" ]; then
            PROJECT_DIR="$GITHUB_WORKSPACE"
          else
            ZIP_FILE=$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f \( \
              -iname "*v1.6*Project*.zip" -o \
              -iname "*v1.6*.zip" \
            \) | head -n 1 || true)

            if [ -z "$ZIP_FILE" ]; then
              echo "ERROR: Upload Allrounder99_Cricket_Final_v1.6_Project.zip to the repository root."
              exit 1
            fi

            rm -rf "$GITHUB_WORKSPACE/extracted"
            mkdir -p "$GITHUB_WORKSPACE/extracted"
            unzip -q "$ZIP_FILE" -d "$GITHUB_WORKSPACE/extracted"

            SETTINGS_FILE=$(find "$GITHUB_WORKSPACE/extracted" -type f -name "settings.gradle.kts" | head -n 1 || true)

            if [ -z "$SETTINGS_FILE" ]; then
              echo "ERROR: settings.gradle.kts not found inside ZIP."
              exit 1
            fi

            PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project: $PROJECT_DIR"

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare APK
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk"

          test -f "$APK_FILE"

          mkdir -p "$GITHUB_WORKSPACE/output"

          cp "$APK_FILE" "$GITHUB_WORKSPACE/output/Allrounder99-Cricket-v1.6.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Allrounder99-Cricket-v1.6-APK
          path: output/Allrounder99-Cricket-v1.6.apk
          if-no-files-found: error
